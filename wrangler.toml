name = "url-pinger-advance"
main = "pinger.js"
compatibility_date = "2023-12-01"

[vars]
ENVIRONMENT = "production"
ALERT_WEBHOOK = ""
LOG_LEVEL = "info"

[triggers]
crons = ["*/10 * * * *"]

[[kv_namespaces]]
binding = "PING_STATS"
id = "01ef56ddb7dd4fd6b0710b222aa21376"
preview_id = "01ef56ddb7dd4fd6b0710b222aa21376"

[env.production]
vars = { ENVIRONMENT = "production" }

[env.production.triggers]
crons = ["*/10 * * * *"]

[env.dev]
vars = { ENVIRONMENT = "development" }

[env.dev.triggers]
crons = ["*/5 * * * *"]